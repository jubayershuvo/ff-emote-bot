<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="theme-color" content="#0a0b0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="referrer" content="no-referrer-when-downgrade">
    <title>Login - B25 CHEATS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>try{const t=localStorage.getItem('b25_theme');if(t)document.documentElement.setAttribute('data-theme',t)}catch(e){}</script>
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        /* ── Dark (default) ── */
        :root,[data-theme="dark"]{
            --bg:#07080c;--surface:#0d1017;--surface-2:#141a24;--surface-3:#1a2232;
            --border:#1e2a3a;--border-focus:#3b82f6;
            --text:#f0f4f8;--text-2:#8899aa;--text-3:#556677;
            --accent:#3b82f6;--accent-glow:rgba(59,130,246,.15);
            --green:#22c55e;--red:#ef4444;
            --yt:#ff0000;--tg:#229ed9;--dc:#5865f2;
            --orb-opacity:.35;--card-shadow:0 0 80px rgba(59,130,246,.06),0 30px 60px rgba(0,0,0,.4);
        }
        /* ── Light ── */
        [data-theme="light"]{
            --bg:#f0f2f5;--surface:#ffffff;--surface-2:#f5f7fa;--surface-3:#ebeef3;
            --border:#dde1e8;--border-focus:#2563eb;
            --text:#111827;--text-2:#4b5563;--text-3:#9ca3af;
            --accent:#2563eb;--accent-glow:rgba(37,99,235,.12);
            --green:#16a34a;--red:#dc2626;
            --yt:#cc0000;--tg:#0077b5;--dc:#4752c4;
            --orb-opacity:.12;--card-shadow:0 8px 40px rgba(0,0,0,.1),0 0 0 1px var(--border);
        }
        /* Theme toggle */
        .theme-toggle{
            position:absolute;top:16px;right:16px;z-index:10;
            width:38px;height:38px;border-radius:10px;border:1px solid var(--border);
            background:var(--surface-2);color:var(--text-2);cursor:pointer;
            display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .2s;
        }
        .theme-toggle:hover{border-color:var(--accent);color:var(--accent)}
        .theme-toggle .fa-sun{display:none}
        .theme-toggle .fa-moon{display:inline}
        [data-theme="light"] .theme-toggle .fa-sun{display:inline}
        [data-theme="light"] .theme-toggle .fa-moon{display:none}
        body{
            background:var(--bg);color:var(--text);
            font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
            min-height:100vh;display:flex;justify-content:center;align-items:center;
            padding:20px;position:relative;overflow:hidden;
            -webkit-font-smoothing:antialiased;
        }

        /* Ambient glow orbs */
        .orb{position:fixed;border-radius:50%;filter:blur(80px);opacity:var(--orb-opacity);pointer-events:none;z-index:0;transition:opacity .3s}
        .orb-1{width:400px;height:400px;background:#3b82f6;top:-100px;left:-100px;animation:drift1 18s ease-in-out infinite}
        .orb-2{width:350px;height:350px;background:#8b5cf6;bottom:-80px;right:-80px;animation:drift2 22s ease-in-out infinite}
        .orb-3{width:250px;height:250px;background:#06b6d4;top:50%;left:60%;animation:drift3 15s ease-in-out infinite}
        @keyframes drift1{0%,100%{transform:translate(0,0)}50%{transform:translate(60px,40px)}}
        @keyframes drift2{0%,100%{transform:translate(0,0)}50%{transform:translate(-50px,-30px)}}
        @keyframes drift3{0%,100%{transform:translate(0,0)}50%{transform:translate(-40px,50px)}}

        .card{
            position:relative;z-index:1;width:100%;max-width:480px;
            background:var(--surface);border:1px solid var(--border);
            border-radius:20px;padding:40px 36px;
            box-shadow:var(--card-shadow);
            animation:cardIn .5s cubic-bezier(.16,1,.3,1);transition:background .3s,border-color .3s,box-shadow .3s;
        }
        @keyframes cardIn{from{opacity:0;transform:translateY(20px) scale(.98)}to{opacity:1;transform:none}}

        /* Top accent line */
        .card::before{
            content:'';position:absolute;top:0;left:20px;right:20px;height:2px;
            background:linear-gradient(90deg,transparent,var(--accent),#8b5cf6,var(--accent),transparent);
            border-radius:2px;
        }

        .logo{text-align:center;margin-bottom:32px}
        .logo-icon{
            width:56px;height:56px;border-radius:16px;
            background:linear-gradient(135deg,#3b82f6,#8b5cf6);
            display:inline-flex;align-items:center;justify-content:center;
            margin-bottom:16px;box-shadow:0 8px 24px rgba(59,130,246,.25);
        }
        .logo-icon i{font-size:24px;color:#fff}
        .logo h1{font-size:26px;font-weight:700;letter-spacing:-.5px;margin-bottom:6px}
        .logo p{color:var(--text-2);font-size:14px;font-weight:400}

        .alert{
            padding:12px 16px;border-radius:10px;font-size:13px;font-weight:500;text-align:center;
            margin-bottom:20px;display:none;line-height:1.5;
            background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.2);
        }
        .alert.show{display:block;animation:shake .4s ease}
        @keyframes shake{20%,60%{transform:translateX(-4px)}40%,80%{transform:translateX(4px)}}

        .form{display:flex;flex-direction:column;gap:22px}
        .field{display:flex;flex-direction:column;gap:8px}
        .field-label{font-size:13px;font-weight:600;color:var(--text-2);display:flex;align-items:center;gap:8px}
        .field-label i{font-size:14px}
        .field-label .fa-youtube{color:var(--yt)}
        .field-label .fa-telegram-plane{color:var(--tg)}

        .input-box{position:relative}
        .input-box i.icon{
            position:absolute;left:14px;top:50%;transform:translateY(-50%);
            color:var(--text-3);font-size:15px;transition:color .2s;pointer-events:none;
        }
        .input-box input{
            width:100%;padding:14px 16px 14px 44px;font-size:15px;
            background:var(--surface-2);color:var(--text);
            border:1px solid var(--border);border-radius:12px;
            outline:none;transition:all .2s;font-family:inherit;
        }
        .input-box input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
        .input-box input:focus ~ i.icon{color:var(--accent)}
        .input-box input::placeholder{color:var(--text-3)}

        .get-pw{display:inline-flex;margin-top:4px}
        .get-pw a{
            font-size:12px;font-weight:600;text-decoration:none;
            padding:6px 14px;border-radius:8px;display:inline-flex;align-items:center;gap:6px;
            transition:all .2s;
        }
        .get-pw a.yt{color:var(--yt);background:rgba(255,0,0,.08);border:1px solid rgba(255,0,0,.15)}
        .get-pw a.yt:hover{background:rgba(255,0,0,.15)}
        .get-pw a.tg{color:var(--tg);background:rgba(34,158,217,.08);border:1px solid rgba(34,158,217,.15)}
        .get-pw a.tg:hover{background:rgba(34,158,217,.15)}

        .divider{height:1px;background:var(--border);margin:4px 0}

        .socials{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
        .soc{
            display:flex;flex-direction:column;align-items:center;gap:6px;
            padding:14px 8px;border-radius:12px;text-decoration:none;
            font-size:12px;font-weight:600;transition:all .2s;
            border:1px solid var(--border);color:var(--text-2);background:var(--surface-2);
        }
        .soc i{font-size:20px}
        .soc:hover{border-color:var(--text-3);color:var(--text);transform:translateY(-2px)}
        .soc.dc:hover{border-color:var(--dc);color:var(--dc)}
        .soc.tg:hover{border-color:var(--tg);color:var(--tg)}
        .soc.yt:hover{border-color:var(--yt);color:var(--yt)}

        .submit{
            width:100%;padding:15px;font-size:15px;font-weight:700;
            border:none;border-radius:12px;cursor:pointer;
            background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff;
            transition:all .2s;position:relative;overflow:hidden;
            box-shadow:0 4px 16px rgba(59,130,246,.3);font-family:inherit;
            display:flex;align-items:center;justify-content:center;gap:8px;
        }
        .submit:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 24px rgba(59,130,246,.4)}
        .submit:active:not(:disabled){transform:translateY(0)}
        .submit:disabled{opacity:.5;cursor:not-allowed}
        .submit.loading{color:transparent}
        .submit.loading::after{
            content:'';position:absolute;width:20px;height:20px;
            border:2px solid rgba(255,255,255,.3);border-top-color:#fff;
            border-radius:50%;animation:spin .7s linear infinite;
        }
        .submit.success{background:linear-gradient(135deg,var(--green),#16a34a)}
        @keyframes spin{to{transform:rotate(360deg)}}

        .footer{text-align:center;margin-top:20px;font-size:12px;color:var(--text-3)}
        .footer i{color:var(--accent)}

        @media(max-width:480px){
            .card{padding:32px 24px;border-radius:16px}
            .socials{grid-template-columns:1fr;gap:8px}
            .soc{flex-direction:row;padding:12px 16px}
        }
    </style>
</head>

    <div class="card">

        <div class="logo">

<script>
/* Theme */
(function(){const s=localStorage.getItem('b25_theme');if(s)document.documentElement.setAttribute('data-theme',s)})();
document.getElementById('theme-toggle').addEventListener('click',function(){
    const c=document.documentElement.getAttribute('data-theme')||'dark';
    const n=c==='dark'?'light':'dark';
    document.documentElement.setAttribute('data-theme',n);localStorage.setItem('b25_theme',n);
});
</script>
<script>
(function(){
    const form=document.getElementById('login-form'),btn=document.getElementById('login-btn');
    const alert_=document.getElementById('alert');
    const yt=document.getElementById('yt-password'),tg=document.getElementById('tg-password');

    try{const s=localStorage.getItem('passwordData');if(s){const d=JSON.parse(s);if(d.ytPassword)yt.value=d.ytPassword;if(d.tgPassword)tg.value=d.tgPassword;}}catch(e){}

    function showErr(m){alert_.textContent=m;alert_.classList.add('show');setTimeout(()=>alert_.classList.remove('show'),5000)}

    form.addEventListener('submit',async e=>{
        e.preventDefault();
        const y=yt.value.trim(),t=tg.value.trim();
        if(!y||!t){showErr('Please enter both passwords');yt.focus();return}
        btn.disabled=true;btn.classList.add('loading');alert_.classList.remove('show');
        try{
            const r=await fetch('/validate_passwords',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({yt_password:y,tg_password:t})});
            const d=await r.json();
            if(!r.ok)throw new Error(d.message||'Invalid passwords');
            if(d.status==='success'){
                try{localStorage.setItem('passwordData',JSON.stringify({ytPassword:y,tgPassword:t,timestamp:Date.now()}))}catch(e){}
                btn.classList.remove('loading');btn.classList.add('success');
                btn.innerHTML='<i class="fas fa-check"></i> Success!';
                let c=7;const iv=setInterval(()=>{btn.innerHTML='<i class="fas fa-check"></i> Redirecting in '+c+'s';c--;if(c<0){clearInterval(iv);window.location.href='/'}},1000);
            }else throw new Error(d.message||'Login failed');
        }catch(err){showErr(err.message||'Error. Try again.');btn.disabled=false;btn.classList.remove('loading')}
    });

    if(!yt.value&&!tg.value)setTimeout(()=>yt.focus(),300);
})();
</script>
